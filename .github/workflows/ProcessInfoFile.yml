name: Process info file

permissions:
  contents: write

on:
  push:
    paths:
      - 'UserData/**'

jobs:
  AddData:
    runs-on: nrec-large
    container:
      image: nmrlipids/core
    env:
      NMLDB_DATA_PATH: ${{ github.workspace }}/BilayerData
      NMLDB_SIMU_PATH: ${{ github.workspace }}/BilayerData/Simulations
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          path: BilayerData

      - name: Check out Databank
        uses: actions/checkout@v4
        with:
          repository: MagnusSletten/Databank
          ref: dev_info_process
          path: Databank

      - name: Computing new data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TQDM_DISABLE: "True"
        run: |
          pip install -e ${{ github.workspace }}/Databank -r ${{ github.workspace }}/Databank/Scripts/DatabankLib/requirements-dev.txt
          python ${{ github.workspace }}/Databank/Scripts/WorkflowScripts/DockerRunInstructions/GetNewData.py
